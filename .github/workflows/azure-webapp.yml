# Deploy Zoochey to Azure App Service (Web App).
#
# Repo secrets (Settings → Secrets and variables → Actions):
#   AZURE_WEBAPP_NAME          — your App Service name (e.g. zoochey)
#   AZURE_WEBAPP_PUBLISH_PROFILE — full contents of the *.PublishSettings file
#
# Azure portal: Web App → Download publish profile → paste XML into the secret.

name: Deploy to Azure Web App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp server.cjs deploy/server.cjs
          echo '{"name":"zoochey","private":true,"scripts":{"start":"node server.cjs"}}' > deploy/package.json

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
